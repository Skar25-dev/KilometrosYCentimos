name: kilometrosycentimos
description: Una aplicación Flutter para gestionar tus coches, kilómetros y gastos.
publish_to: 'none' # si no lo publicarás en pub.dev

environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  uuid: ^4.2.1
  http: ^1.5.0
  image_picker: ^1.1.2
  supabase_flutter: ^2.10.3
  fl_chart: ^0.66.2
  flutter_launcher_icons: "^0.13.1"

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo_corto.png"

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
  - assets/images/logo.png
  - assets/images/logo_corto.png
